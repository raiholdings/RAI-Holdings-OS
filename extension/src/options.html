<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>RAI OS — Cài đặt</title>
    <style>
      body { font-family: system-ui, sans-serif; background: #0a0b10; color: #e8eaf0; max-width: 480px; margin: 40px auto; padding: 0 20px; }
      h1 { font-size: 18px; } label { display: block; font-size: 13px; color: #9aa3b7; margin: 16px 0 6px; }
      input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #232735; background: #12141c; color: #e8eaf0; }
      button { margin-top: 16px; padding: 10px 16px; border-radius: 8px; border: none; background: linear-gradient(135deg, #4f8ff7, #7c5cff); color: #fff; font-weight: 600; cursor: pointer; }
      .ok { color: #3b7a57; font-size: 13px; margin-left: 10px; }
    </style>
  </head>
  <body>
    <h1>RAI OS — Cài đặt</h1>
    <label for="base">Địa chỉ RAI OS (base URL)</label>
    <input id="base" placeholder="https://raiholdings.vn" />
    <div><button id="save">Lưu</button><span class="ok" id="ok"></span></div>
    <script src="options.js"></script>
  </body>
</html>
