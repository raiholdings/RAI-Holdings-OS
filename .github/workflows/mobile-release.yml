name: Mobile release (Capacitor + fastlane)

# Manual trigger. Builds the Capacitor shells and uploads to Google Play (internal)
# and TestFlight — only when the corresponding secrets are configured.
#
# Required GitHub Secrets (you create these in the Apple/Google consoles):
#   Android: PLAY_SERVICE_ACCOUNT_JSON, ANDROID_KEYSTORE_BASE64,
#            ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD
#   iOS:     ASC_KEY_ID, ASC_ISSUER_ID, ASC_KEY_P8_BASE64,
#            IOS_DIST_CERT_P12_BASE64, IOS_DIST_CERT_PASSWORD, IOS_PROVISIONING_PROFILE_BASE64

on:
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: ruby/setup-ruby@v1
        with: { ruby-version: "3.3", bundler-cache: false }
      - run: gem install fastlane --no-document
      - name: Prepare Capacitor (Android)
        working-directory: mobile
        run: |
          npm install
          npx cap add android || true
          npx cap sync android
      - name: Decode keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > mobile/android/app/rai-os.keystore
      - name: Build + upload (fastlane android release)
        if: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON != '' }}
        working-directory: mobile
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: fastlane android release
      - name: Build AAB only (no Play secret yet)
        if: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON == '' }}
        working-directory: mobile/android
        run: ./gradlew bundleRelease || ./gradlew bundleDebug
      - uses: actions/upload-artifact@v4
        with: { name: rai-os-android, path: mobile/android/app/build/outputs/bundle/**/*.aab, if-no-files-found: ignore }

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: ruby/setup-ruby@v1
        with: { ruby-version: "3.3" }
      - run: gem install fastlane --no-document
      - name: Prepare Capacitor (iOS)
        working-directory: mobile
        run: |
          npm install
          npx cap add ios || true
          npx cap sync ios
      - name: Build + upload TestFlight (fastlane ios release)
        if: ${{ secrets.ASC_KEY_ID != '' }}
        working-directory: mobile
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: fastlane ios release
      - name: Note (no Apple secrets yet)
        if: ${{ secrets.ASC_KEY_ID == '' }}
        run: echo "Add ASC_KEY_ID / ASC_ISSUER_ID / ASC_KEY_P8_BASE64 + iOS signing secrets to enable upload."
