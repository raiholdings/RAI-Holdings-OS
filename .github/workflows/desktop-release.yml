name: Desktop release (Tauri)

# Tag a version (e.g. v1.4.0) → build RAI OS desktop for Win/macOS/Linux,
# sign, and publish artifacts to a GitHub Release. Updater manifest (latest.json)
# is generated when TAURI_SIGNING_PRIVATE_KEY is set.
#
# Secrets (GitHub → Settings → Secrets) — NEVER commit these:
#   TAURI_SIGNING_PRIVATE_KEY            updater private key (tauri signer generate)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD   its password
#   APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD / APPLE_SIGNING_IDENTITY
#   APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID   (macOS notarization)
#   WINDOWS code-signing handled via your signer of choice

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf build-essential libssl-dev libgtk-3-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with: { node-version: 20 }

      - name: Generate app icons from source PNG
        run: npx --yes @tauri-apps/cli@latest icon desktop/src-tauri/icons/icon.png

      - name: Build + release (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: "RAI OS ${{ github.ref_name }}"
          releaseBody: "Tải RAI OS cho máy tính. Xem changelog tại app.raiholdings.vn/releases."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
