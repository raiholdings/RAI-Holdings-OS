# RAI LLMs Gateway — local/VPS stack.
# After the first `docker compose up -d`, run migrations once:
#   docker compose exec gateway npm run migrate
# Put a reverse proxy (Caddy/Nginx) in front for TLS on llms.raiholdings.vn.

services:
  gateway:
    build: .
    env_file: .env
    environment:
      # Inside the compose network, reach db/redis by service name.
      DATABASE_URL: ${DATABASE_URL:-postgres://rai:rai@db:5432/rai_llms}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rai}
      POSTGRES_DB: ${POSTGRES_DB:-rai_llms}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # NOTE: do NOT publish 5432 publicly in production. Uncomment only for local debugging.
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rai} -d ${POSTGRES_DB:-rai_llms}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7
    volumes:
      - redisdata:/data
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
